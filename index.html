<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>시험 일정 공유 달력</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0c10;
    --surface: #13131a;
    --surface2: #1c1c26;
    --surface3: #242432;
    --border: #ffffff0f;
    --border2: #ffffff18;
    --text: #f0f0f8;
    --text-sub: #9898b8;
    --text-muted: #55556a;
    --hdr-bg: rgba(12,12,16,0.9);
    --shadow: 0 16px 48px rgba(0,0,0,0.6);

    --c1: #4d8ff5;
    --c2: #00c9c9;
    --c3: #f06292;
    --c4: #ff8c42;
    --c5: #f5c842;
    --c6: #a259ff;
    --c7: #607080;

    --radius: 12px;
    --ease: cubic-bezier(0.4,0,0.2,1);
  }

  /* ── LIGHT MODE ── */
  body.light {
    --bg: #f4f5f8;
    --surface: #ffffff;
    --surface2: #f0f1f5;
    --surface3: #e4e6ed;
    --border: #0000000e;
    --border2: #00000018;
    --text: #1a1a2e;
    --text-sub: #5a5a7a;
    --text-muted: #9898aa;
    --hdr-bg: rgba(244,245,248,0.92);
    --shadow: 0 16px 48px rgba(0,0,0,0.12);
  }
  body.light .sync-dot.ok { background: #16a34a; box-shadow: 0 0 6px #16a34a60; }
  body.light .day-n.today-n { box-shadow: 0 2px 8px #4d8ff530; }
  body.light .cell.today { background: #4d8ff50a; border-color: #4d8ff528; }
  body.light .hdr { border-bottom-color: #0000001a; }
  body.light .cal-panel { border-right-color: #0000001a; }
  body.light .right-combined { background: #ffffff; }
  body.light .modal { background: #ffffff; }
  body.light .fi, body.light .fs { background: #f4f5f8; border-color: #0000001a; color: var(--text); }
  body.light .pkey { background: #f0f1f5; border-color: #0000001a; }
  body.light .pkey:hover { background: #e4e6ed; }
  body.light .ym-popup { box-shadow: 0 12px 36px rgba(0,0,0,0.15); }
  body.light #tip { box-shadow: 0 8px 28px rgba(0,0,0,0.15); }
  body.light #toast { box-shadow: 0 4px 18px rgba(0,0,0,0.12); }

  /* ── THEME TOGGLE ── */
  .theme-toggle {
    width: 36px; height: 20px; border-radius: 100px;
    background: var(--surface2); border: 1px solid var(--border2);
    cursor: pointer; position: relative; transition: background 0.3s;
    flex-shrink: 0;
  }
  .theme-toggle::after {
    content: ''; position: absolute;
    width: 14px; height: 14px; border-radius: 50%;
    top: 2px; left: 2px;
    background: var(--text-muted);
    transition: all 0.25s var(--ease);
  }
  body.light .theme-toggle { background: #4d8ff520; border-color: #4d8ff540; }
  body.light .theme-toggle::after { transform: translateX(16px); background: var(--c1); }
  .theme-icon { font-size: 13px; line-height: 1; }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
  }

  /* ── LOCK ── */
  #lock {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 24px; z-index: 9999;
  }
  .lock-badge {
    font-size: 10px; letter-spacing: 5px; text-transform: uppercase;
    color: var(--text-muted); font-family: 'Outfit', sans-serif; font-weight: 500;
  }
  .lock-title {
    font-family: 'Outfit', sans-serif; font-size: 34px; font-weight: 700;
    letter-spacing: -1px;
    background: linear-gradient(135deg, #4d8ff5 0%, #a259ff 60%, #f06292 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .lock-sub { font-size: 13px; color: var(--text-muted); text-align: center; line-height: 2; }
  #pin-dots { display: flex; gap: 12px; }
  .pin-dot {
    width: 11px; height: 11px; border-radius: 50%;
    border: 1.5px solid var(--border2); transition: all 0.18s var(--ease);
  }
  .pin-dot.on { background: var(--c1); border-color: var(--c1); box-shadow: 0 0 12px #4d8ff560; }
  #pin-pad { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; width: 210px; }
  .pkey {
    padding: 16px 0; border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text); font-size: 19px; font-weight: 500;
    cursor: pointer; transition: all 0.14s var(--ease);
    font-family: 'Outfit', sans-serif; user-select: none;
  }
  .pkey:hover { background: var(--surface3); border-color: var(--border2); }
  .pkey:active { transform: scale(0.92); }
  .pkey.sm { font-size: 13px; color: var(--text-muted); }
  #pin-err { color: #f06292; font-size: 12px; min-height: 18px; font-family: 'Outfit', sans-serif; letter-spacing: 0.5px; }
  .shake { animation: shake 0.38s ease; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-7px)} 75%{transform:translateX(7px)} }

  /* ── APP ── */
  #app { display: none; flex-direction: column; height: 100vh; }
  #app.on { display: flex; }

  /* ── HEADER ── */
  .hdr {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px; height: 56px;
    border-bottom: 1px solid var(--border);
    background: var(--hdr-bg);
    backdrop-filter: blur(20px);
    flex-shrink: 0; z-index: 200;
  }
  .hdr-left { display: flex; align-items: center; gap: 20px; }
  .hdr-logo {
    font-family: 'Outfit', sans-serif; font-size: 15px; font-weight: 600; letter-spacing: -0.3px;
    background: linear-gradient(90deg, #4d8ff5, #a259ff);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .legend { display: flex; flex-wrap: wrap; gap: 8px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-sub); cursor: default; }
  .legend-dot { width: 7px; height: 7px; border-radius: 2px; flex-shrink: 0; }
  .hdr-right { display: flex; gap: 8px; align-items: center; }
  .sync-pill {
    display: flex; align-items: center; gap: 5px;
    padding: 4px 10px; border-radius: 100px;
    background: var(--surface2); border: 1px solid var(--border);
    font-size: 10px; color: var(--text-muted); font-family: 'Outfit', sans-serif;
  }
  .sync-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--text-muted); }
  .sync-dot.ok { background: #22c55e; box-shadow: 0 0 6px #22c55e80; }
  .sync-dot.busy { background: var(--c5); animation: blink 1s infinite; }
  .sync-dot.err { background: #f06292; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

  /* ── BUTTONS ── */
  .btn {
    padding: 7px 14px; border-radius: 8px; border: none;
    font-size: 12px; font-weight: 500; cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    display: inline-flex; align-items: center; gap: 5px;
    transition: all 0.15s var(--ease);
  }
  .btn-primary {
    background: linear-gradient(135deg, #4d8ff5, #a259ff);
    color: #fff; border: none;
  }
  .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn-ghost {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text-sub);
  }
  .btn-ghost:hover { background: var(--surface3); color: var(--text); }
  .btn-danger {
    background: transparent; border: 1px solid #f0629230;
    color: #f06292;
  }
  .btn-danger:hover { background: #f0629215; }

  /* ── LAYOUT ── */
  .main-layout { display: flex; flex: 1; overflow: hidden; }

  /* ── CALENDAR PANEL ── */
  .cal-panel {
    flex: 1; min-width: 0; display: flex; flex-direction: column;
    border-right: 1px solid var(--border); overflow: hidden;
  }
  .cal-nav-wrap {
    display: flex; align-items: center; justify-content: center;
    gap: 10px; padding: 14px 16px 8px; flex-shrink: 0; position: relative;
  }
  .nav-btn {
    width: 28px; height: 28px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--surface2);
    color: var(--text-sub); cursor: pointer; font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.14s;
  }
  .nav-btn:hover { background: var(--surface3); color: var(--text); border-color: var(--border2); }
  .month-lbl {
    font-family: 'Outfit', sans-serif; font-size: 16px; font-weight: 600;
    min-width: 130px; text-align: center; cursor: pointer; letter-spacing: -0.3px;
    color: var(--text); transition: color 0.14s;
  }
  .month-lbl:hover { color: var(--c1); }

  /* YM PICKER */
  .ym-popup {
    position: absolute; top: 54px; left: 50%; transform: translateX(-50%);
    z-index: 500; background: var(--surface2);
    border: 1px solid var(--border2); border-radius: 14px;
    padding: 14px; width: 240px;
    box-shadow: var(--shadow),0 0 0 1px var(--border);
    display: none;
  }
  .ym-popup.show { display: block; animation: fadeUp 0.18s var(--ease); }
  @keyframes fadeUp { from{opacity:0;transform:translateX(-50%) translateY(6px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
  .ym-year-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .ym-year-nav {
    background: var(--surface3); border: 1px solid var(--border);
    color: var(--text-sub); width: 26px; height: 26px; border-radius: 7px;
    cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center;
    transition: all 0.12s;
  }
  .ym-year-nav:hover { background: var(--border2); color: var(--text); }
  .ym-year-lbl { font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 600; }
  .ym-months { display: grid; grid-template-columns: repeat(4,1fr); gap: 5px; }
  .ym-month {
    padding: 6px 0; border-radius: 7px;
    border: 1px solid transparent; background: var(--surface3);
    color: var(--text-sub); font-size: 12px; cursor: pointer; text-align: center;
    transition: all 0.12s; font-family: 'Noto Sans KR', sans-serif;
  }
  .ym-month:hover { color: var(--text); border-color: var(--border2); }
  .ym-month.active {
    border-color: var(--c1); background: #4d8ff518;
    color: var(--c1); font-weight: 600;
  }

  /* CALENDAR GRID */
  .cal-wrap { flex: 1; overflow: auto; padding: 0 10px 10px; }
  .cal { width: 100%; border-collapse: collapse; table-layout: fixed; }
  .cal thead th {
    padding: 4px 2px 6px; font-size: 9px; letter-spacing: 2px;
    text-transform: uppercase; color: var(--text-muted);
    font-family: 'Outfit', sans-serif; font-weight: 500; text-align: center;
  }
  .cal thead th:first-child { color: #f06292aa; }
  .cal thead th:last-child { color: #7090c0aa; }

  .cell {
    vertical-align: top; padding: 3px; height: 94px;
    border: 1px solid var(--border); overflow: visible;
    width: 14.28%; position: relative;
    transition: background 0.12s;
  }
  .cell:hover:not(.other) { background: #ffffff04; }
  .cell.other { opacity: 0.18; }
  .cell.today { background: #4d8ff508; border-color: #4d8ff522; }

  .day-n {
    font-family: 'Outfit', sans-serif; font-size: 11px; font-weight: 500;
    color: var(--text-muted); width: 22px; height: 22px;
    display: flex; align-items: center; justify-content: center; border-radius: 50%;
  }
  .day-n.today-n { background: var(--c1); color: #fff; font-weight: 600; box-shadow: 0 2px 8px #4d8ff540; }
  .col-0 .day-n { color: #f0629280; }
  .col-6 .day-n { color: #7090c080; }

  /* EVENT BARS */
  .bars { display: flex; flex-direction: column; gap: 2px; margin-top: 2px; }
  .bar {
    height: 15px; font-size: 9px; font-weight: 500; padding: 0 5px;
    display: flex; align-items: center; overflow: hidden; white-space: nowrap;
    cursor: pointer; border-radius: 3px; user-select: none;
    transition: opacity 0.12s, filter 0.12s;
    box-sizing: border-box; width: 100%;
  }
  .bar span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .bar.single-day { display: inline-flex; max-width: 100%; }
  .bar.r-open  { border-radius: 3px 0 0 3px; margin-right: -4px; width: calc(100% + 4px); }
  .bar.l-open  { border-radius: 0 3px 3px 0; margin-left: -4px; width: calc(100% + 4px); padding-left: 2px; }
  .bar.both-open { border-radius: 0; margin: 0 -4px; width: calc(100% + 8px); padding-left: 2px; }
  .bar:hover { filter: brightness(1.2) !important; }
  .bar.hi { outline: 1.5px solid rgba(255,255,255,0.4); filter: brightness(1.15); z-index: 2; }
  .bar.dim { opacity: 0.15 !important; }
  .more { font-size: 8px; color: var(--text-muted); padding: 1px 3px; cursor: pointer; font-family: 'Outfit', sans-serif; }

  /* ── RIGHT COMBINED PANEL ── */
  .right-combined {
    width: 300px; flex-shrink: 0; display: flex; flex-direction: column;
    background: var(--surface); overflow: hidden;
  }
  /* 공통 섹션 헤더 */
  .panel-hd {
    padding: 11px 16px 9px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  .panel-hd-left { display: flex; align-items: center; gap: 7px; }
  .panel-icon {
    width: 24px; height: 24px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center; font-size: 12px;
  }
  .panel-icon.todo { background: linear-gradient(135deg,#00c9c920,#4d8ff520); border: 1px solid #00c9c930; }
  .panel-icon.memo { background: linear-gradient(135deg,#4d8ff520,#a259ff20); border: 1px solid #a259ff30; }
  .panel-title { font-family:'Outfit',sans-serif; font-size:11px; font-weight:600; color:var(--text-sub); letter-spacing:0.5px; }

  /* TODO */
  .todo-section { flex-shrink: 0; border-bottom: 1px solid var(--border); }
  .todo-add-btn {
    width: 20px; height: 20px; border-radius: 5px;
    background: var(--surface2); border: 1px solid var(--border2);
    color: var(--text-sub); cursor: pointer; font-size: 15px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.14s; line-height: 1;
  }
  .todo-add-btn:hover { background: var(--c1); color: #fff; border-color: var(--c1); }
  .todo-list { max-height: 160px; overflow-y: auto; padding: 4px 8px; }
  .todo-item {
    display: flex; align-items: center; gap: 7px;
    padding: 4px 5px; border-radius: 6px; transition: background 0.12s;
  }
  .todo-item:hover { background: var(--surface2); }
  .todo-check {
    width: 15px; height: 15px; border-radius: 4px; flex-shrink: 0;
    border: 1.5px solid var(--border2); background: transparent; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; font-size: 9px; color: transparent;
  }
  .todo-item.done .todo-check { background: var(--c2); border-color: var(--c2); color: #fff; }
  .todo-text {
    flex: 1; font-size: 12px; color: var(--text); background: transparent;
    border: none; outline: none; font-family:'Noto Sans KR',sans-serif; caret-color: var(--c1);
  }
  .todo-item.done .todo-text { color: var(--text-muted); text-decoration: line-through; }
  .todo-del {
    opacity: 0; font-size: 10px; color: var(--text-muted); cursor: pointer;
    padding: 2px 4px; border-radius: 3px; transition: all 0.12s; background: transparent; border: none;
  }
  .todo-item:hover .todo-del { opacity: 1; }
  .todo-del:hover { color: #f06292; background: #f0629215; }
  .todo-empty { text-align: center; padding: 12px 0; color: var(--text-muted); font-size: 11px; }
  .todo-input-row {
    display: flex; gap: 6px; padding: 6px 8px 8px;
    border-top: 1px solid var(--border);
  }
  .todo-input {
    flex: 1; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; padding: 5px 9px; font-size: 12px; color: var(--text);
    outline: none; font-family:'Noto Sans KR',sans-serif; transition: border-color 0.14s;
  }
  .todo-input:focus { border-color: var(--c2); }
  .todo-submit {
    padding: 5px 9px; border-radius: 6px; border: none;
    background: var(--c2); color: #fff; font-size: 11px;
    cursor: pointer; font-family:'Outfit',sans-serif; font-weight:600;
    transition: opacity 0.14s; white-space: nowrap;
  }
  .todo-submit:hover { opacity: 0.85; }

  /* MEMO */
  .memo-section { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .memo-status {
    font-size: 10px; color: var(--text-muted); font-family:'Outfit',sans-serif;
    display: flex; align-items: center; gap: 4px;
  }
  .memo-status-dot { width: 5px; height: 5px; border-radius: 50%; background: transparent; transition: all 0.3s; }
  .memo-status-dot.unsaved { background: var(--c5); box-shadow: 0 0 6px #f5c84260; }
  .memo-status-dot.saved { background: #22c55e; box-shadow: 0 0 6px #22c55e50; }
  .memo-area {
    flex: 1; background: transparent; border: none; outline: none; resize: none;
    color: var(--text); font-family:'Noto Sans KR',sans-serif;
    font-size: 13px; line-height: 1.85; padding: 12px 16px;
    caret-color: var(--c1);
  }
  .memo-area::placeholder { color: var(--text-muted); font-size: 12px; line-height: 1.9; }
  .memo-footer {
    padding: 8px 16px; border-top: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
  }
  .memo-char-count { font-size: 10px; color: var(--text-muted); font-family:'Outfit',sans-serif; }
  .memo-clear-btn {
    font-size: 10px; color: var(--text-muted); cursor: pointer; padding: 2px 6px;
    border-radius: 4px; border: 1px solid transparent; font-family:'Outfit',sans-serif;
    transition: all 0.12s; background: transparent;
  }
  .memo-clear-btn:hover { color: #f06292; border-color: #f0629230; background: #f0629210; }

  /* ── TOOLTIP ── */
  #tip {
    position: fixed; z-index: 6000; pointer-events: none;
    background: var(--surface2); border: 1px solid var(--border2);
    border-radius: 12px; padding: 11px 13px;
    max-width: 230px; min-width: 160px; font-size: 11px;
    box-shadow: 0 12px 36px rgba(0,0,0,0.6); display: none;
  }
  #tip.show { display: block; }
  .tip-name { font-size: 12px; font-weight: 700; margin-bottom: 7px; font-family: 'Outfit', sans-serif; }
  .tip-row { display: flex; align-items: center; gap: 5px; margin-bottom: 3px; color: var(--text-sub); }
  .tip-dot { width: 7px; height: 7px; border-radius: 2px; flex-shrink: 0; }
  .tip-hr { border: none; border-top: 1px solid var(--border); margin: 7px 0; }
  .tip-linked-hd { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 5px; font-family: 'Outfit', sans-serif; }
  .tip-lrow { display: flex; align-items: center; gap: 5px; margin-bottom: 3px; }

  /* ── MODAL ── */
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.75);
    z-index: 3000; display: none; align-items: center; justify-content: center;
    backdrop-filter: blur(6px);
  }
  .overlay.open { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border2);
    border-radius: 18px; padding: 26px; width: 420px;
    max-width: 95vw; max-height: 90vh; overflow-y: auto;
    box-shadow: 0 24px 64px rgba(0,0,0,0.7);
    animation: mIn 0.22s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes mIn { from{transform:scale(0.9) translateY(12px);opacity:0} to{transform:scale(1) translateY(0);opacity:1} }
  .modal-ttl { font-family: 'Outfit', sans-serif; font-size: 17px; font-weight: 600; margin-bottom: 20px; letter-spacing: -0.3px; }
  .fg { margin-bottom: 14px; }
  .fg label {
    display: block; font-size: 10px; font-weight: 500; letter-spacing: 1px;
    color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase;
    font-family: 'Outfit', sans-serif;
  }
  .fi, .fs {
    width: 100%; padding: 9px 12px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 9px; color: var(--text); font-size: 13px; outline: none;
    font-family: 'Noto Sans KR', sans-serif; transition: border-color 0.15s, box-shadow 0.15s;
  }
  .fi:focus, .fs:focus { border-color: #4d8ff550; box-shadow: 0 0 0 3px #4d8ff515; }
  .fs option { background: var(--surface2); }
  .date-row { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
  .sub-btns { display: flex; gap: 6px; }
  .sub-btn {
    flex: 1; padding: 7px 4px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--surface2);
    color: var(--text-sub); font-size: 11px; cursor: pointer; text-align: center;
    transition: all 0.13s; font-family: 'Noto Sans KR', sans-serif;
  }

<script>
// ★ Apps Script URL 여기에 붙여넣기
const API_URL = 'YOUR_APPS_SCRIPT_URL_HERE';
const MEMO_KEY = 'exam_cal_memo_v2';
const TODO_KEY = 'exam_cal_todos';

const PASS = '1234';
const CATS    = ['신청기간','필기시험','실기시험','정유나','윤도현','결과발표','기타'];
const CCOLORS = ['#4d8ff5','#00c9c9','#f06292','#ff8c42','#f5c842','#a259ff','#607080'];
const CTEXTS  = ['#fff','#fff','#fff','#fff','#111','#fff','#fff'];
const SUBLBL  = { w:'필기신청', p:'실기신청', b:'필기+실기신청' };

let evs=[], editId=null, curSub='w', cy, cm;
let buf='', todos=[];
const today = new Date();

(function init(){
  cy=today.getFullYear(); cm=today.getMonth();
  renderCal(); loadEvs();
  setInterval(loadEvs, 10*60*1000);
  initMemo();
  initTodo();
})();

// API
async function loadEvs(){
  setSync('busy','동기화 중...');
  try {
    const r=await fetch(API_URL+'?action=get',{cache:'no-store'});
    const text=await r.text(); let data;
    try{ data=JSON.parse(text); }catch(e){ throw new Error('JSON 오류'); }
    if(data.ok){ evs=data.events||[]; renderCal(); setSync('ok','동기화됨 · '+new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})); }
    else throw new Error(data.error);
  }catch(e){ setSync('err','연결 실패'); renderCal(); }
}
async function saveEvs(){
  setSync('busy','저장 중...');
  try{
    // no-cors 모드로 POST 전송 (응답 확인 불가하지만 저장은 됨)
    await fetch(API_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: {'Content-Type':'text/plain'},
      body: JSON.stringify({action:'set', events:evs})
    });
    setSync('ok','저장됨 · '+new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}));
  }catch(e){ setSync('err','저장 실패'); toast('⚠️','저장 실패'); console.error(e); }
}
function manualSync(){ loadEvs(); }
function setSync(s,l){ document.getElementById('sdot').className='sync-dot '+s; document.getElementById('slbl').textContent=l; }

// PIN
function pp(d){
  if(buf.length>=4) return;
  buf+=d; updDots();
  if(buf.length===4){
    setTimeout(()=>{
      if(buf===PASS){ document.getElementById('lock').style.display='none'; document.getElementById('app').classList.add('on'); }
      else{ document.getElementById('pin-err').textContent='비밀번호가 틀렸습니다'; document.getElementById('pin-dots').classList.add('shake'); setTimeout(()=>{ document.getElementById('pin-dots').classList.remove('shake'); buf=''; updDots(); document.getElementById('pin-err').textContent=''; },650); }
    },120);
  }
}
function pb(){ buf=buf.slice(0,-1); updDots(); }
function pc(){ buf=''; updDots(); }
function updDots(){ for(let i=0;i<4;i++) document.getElementById('d'+i).classList.toggle('on',i<buf.length); }

// CALENDAR
function renderCal(){
  const MN=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('mlbl').textContent=cy+'년 '+MN[cm];
  const fd=new Date(cy,cm,1).getDay(), dim=new Date(cy,cm+1,0).getDate(), dip=new Date(cy,cm,0).getDate();
  let cells=[];
  for(let i=fd-1;i>=0;i--) cells.push({d:dip-i,m:cm-1,y:cm===0?cy-1:cy,o:true});
  for(let d=1;d<=dim;d++) cells.push({d,m:cm,y:cy,o:false});
  while(cells.length%7){ const nx=cells.length-fd-dim+1; cells.push({d:nx,m:cm+1,y:cm===11?cy+1:cy,o:true}); }
  const layout=buildLayout(cells);
  const tb=document.getElementById('cbody'); tb.innerHTML='';
  for(let r=0;r<cells.length/7;r++){
    const tr=document.createElement('tr');
    for(let c=0;c<7;c++){
      const cell=cells[r*7+c];
      const ds=fmtD(cell.y,cell.m,cell.d);
      const isTd=!cell.o&&cell.y===today.getFullYear()&&cell.m===today.getMonth()&&cell.d===today.getDate();
      const td=document.createElement('td');
      td.className='cell col-'+c+(cell.o?' other':'')+(isTd?' today':'');
      const dn=document.createElement('div'); dn.className='day-n'+(isTd?' today-n':''); dn.textContent=cell.d; td.appendChild(dn);
      const bd=document.createElement('div'); bd.className='bars';
      const items=(layout[ds]||[]).slice().sort((a,b)=>a.slot-b.slot);
      const MAX=4; const seen=new Set(); let shown=0;
      // 슬롯 번호 기준으로 빈 슬롯도 빈 행으로 채워서 위치 고정
      const maxSlot = items.length ? Math.min(items[items.length-1].slot, MAX-1) : -1;
      let itemIdx=0;
      for(let rowSlot=0; rowSlot<=maxSlot && shown<MAX; rowSlot++){
        const it = items[itemIdx];
        if(!it || it.slot !== rowSlot){
          // 빈 슬롯 → 투명 spacer
          const spacer=document.createElement('div');
          spacer.style.cssText='height:15px;flex-shrink:0;';
          bd.appendChild(spacer); shown++;
          continue;
        }
        itemIdx++;
        if(seen.has(it.slot)) continue; seen.add(it.slot); shown++;
        const ev=evs.find(e=>e.id===it.evId); if(!ev){ shown--; continue; }
        const bar=document.createElement('div');
        const p=it.pos;
        bar.className='bar'+(p==='single'?' single-day':p==='start'?' r-open':p==='end'?' l-open':p==='middle'?' both-open':'');
        bar.dataset.evid=ev.id; bar.style.background=CCOLORS[ev.cat]||'#607080'; bar.style.color=CTEXTS[ev.cat]||'#fff';
        const lbl=document.createElement('span');
        if(p==='start'||p==='single'){ const cl=ev.cat===0&&ev.sub?SUBLBL[ev.sub]:CATS[ev.cat]||'기타'; lbl.textContent=cl+' · '+ev.name; }
        bar.appendChild(lbl);
        bar.addEventListener('mouseenter',e=>showTip(e,ev.id));
        bar.addEventListener('mousemove',e=>moveTip(e));
        bar.addEventListener('mouseleave',hideTip);
        bar.addEventListener('click',()=>openEdit(ev.id));
        bd.appendChild(bar);
      }
      const extra=new Set(items.map(i=>i.slot)).size-MAX;
      if(extra>0){ const mb=document.createElement('div'); mb.className='more'; mb.textContent='+'+extra; bd.appendChild(mb); }
      td.appendChild(bd); tr.appendChild(td);
    }
    tb.appendChild(tr);
  }
}
function buildLayout(cells){
  const layout={}; cells.forEach(c=>layout[fmtD(c.y,c.m,c.d)]=[]);
  const sorted=[...evs].sort((a,b)=>a.start.localeCompare(b.start));

  // 각 이벤트에 고정 슬롯 배정
  // 슬롯별로 "이 슬롯이 언제까지 사용 중인지" 추적
  const evSlot={};
  // slotEnd[slot] = 해당 슬롯의 마지막 사용 날짜
  const slotEnd=[];

  sorted.forEach(ev=>{
    // 이 이벤트와 겹치지 않는 가장 작은 슬롯 찾기
    let slot=0;
    while(slotEnd[slot] && slotEnd[slot] >= ev.start) slot++;
    slotEnd[slot] = ev.end;
    evSlot[ev.id] = slot;
  });

  // 각 날짜에 이벤트 배치 (슬롯 고정)
  sorted.forEach(ev=>{
    const slot = evSlot[ev.id];
    let cur = new Date(ev.start+'T00:00:00');
    const end = new Date(ev.end+'T00:00:00');
    while(cur<=end){
      const ds = cur.getFullYear()+'-'+String(cur.getMonth()+1).padStart(2,'0')+'-'+String(cur.getDate()).padStart(2,'0');
      if(layout[ds]!==undefined){
        const s=ev.start===ev.end, iS=ds===ev.start, iE=ds===ev.end;
        layout[ds].push({evId:ev.id, slot, pos:s?'single':iS?'start':iE?'end':'middle'});
      }
      cur.setDate(cur.getDate()+1);
    }
  });

  // 각 날짜의 이벤트를 슬롯 순서대로 정렬하고
  // 빈 슬롯이 있어도 시각적 위치(row)를 슬롯 번호 기준으로 고정
  Object.keys(layout).forEach(ds=>{
    layout[ds].sort((a,b)=>a.slot-b.slot);
    // 슬롯 번호 그대로 row index로 사용 (빈 슬롯은 빈 공간으로)
    layout[ds] = layout[ds].map(item=>({...item, row: item.slot}));
  });

  return layout;
}
function fmtD(y,m,d){ return y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0'); }

// TODO LIST

function initTodo(){
  const saved = localStorage.getItem(TODO_KEY);
  if(saved) todos = JSON.parse(saved);
  renderTodos();
}

function saveTodos(){
  localStorage.setItem(TODO_KEY, JSON.stringify(todos));
}

function renderTodos(){
  const wrap = document.getElementById('todo-list');
  if(!todos.length){
    wrap.innerHTML = '<div class="todo-empty">할 일을 추가해보세요!</div>';
    return;
  }
  wrap.innerHTML = todos.map((t,i) => `
    <div class="todo-item${t.done?' done':''}" id="todo-${i}">
      <div class="todo-check" onclick="toggleTodo(${i})">
        ${t.done ? '✓' : ''}
      </div>
      <input class="todo-text" value="${t.text.replace(/"/g,'&quot;')}"
        onchange="editTodo(${i}, this.value)"
        onkeydown="if(event.key==='Enter') this.blur()">
      <button class="todo-del" onclick="deleteTodo(${i})">✕</button>
    </div>
  `).join('');
}

function addTodo(){
  const input = document.getElementById('todo-input');
  const text = input.value.trim();
  if(!text) return;
  todos.push({ text, done: false });
  input.value = '';
  saveTodos(); renderTodos();
}

function toggleTodo(i){
  todos[i].done = !todos[i].done;
  saveTodos(); renderTodos();
}

function editTodo(i, val){
  todos[i].text = val.trim() || todos[i].text;
  saveTodos();
}

function deleteTodo(i){
  todos.splice(i, 1);
  saveTodos(); renderTodos();
}

function focusTodoInput(){
  document.getElementById('todo-input').focus();
}

function updateMemoCount(){ const v=document.getElementById('memo-area').value; document.getElementById('memo-count').textContent=v.length+'자'; }
function setMemoStatus(state,lbl){

// TOOLTIP
function showTip(e,evId){
  const ev=evs.find(x=>x.id===evId); if(!ev) return;
  const linked=evs.filter(x=>x.name===ev.name&&x.id!==evId&&[0,1,2].includes(x.cat));
  const cl=ev.cat===0&&ev.sub?SUBLBL[ev.sub]:CATS[ev.cat]||'기타';
  let h=`<div class="tip-name">${ev.name}</div>`;
  if(ev.round) h+=`<div class="tip-row" style="font-size:10px;color:var(--text-muted)">${ev.round}</div>`;
  h+=`<div class="tip-row"><div class="tip-dot" style="background:${CCOLORS[ev.cat]}"></div><b>${cl}</b></div>`;
  h+=`<div class="tip-row">📅 ${ev.start} ~ ${ev.end}</div>`;
  if(ev.place) h+=`<div class="tip-row">📍 ${ev.place}</div>`;
  if(ev.memo)  h+=`<div class="tip-row">💬 ${ev.memo}</div>`;
  if(linked.length){
    h+=`<hr class="tip-hr"><div class="tip-linked-hd">연결된 일정</div>`;
    linked.forEach(lk=>{ const ll=lk.cat===0&&lk.sub?SUBLBL[lk.sub]:CATS[lk.cat]||'기타'; h+=`<div class="tip-lrow"><div class="tip-dot" style="background:${CCOLORS[lk.cat]}"></div><span>${ll}</span><span style="font-size:10px;color:var(--text-muted);margin-left:auto;padding-left:6px">${lk.start}~${lk.end}</span></div>`; });
  }
  const tip=document.getElementById('tip'); tip.innerHTML=h; tip.classList.add('show'); moveTip(e);
  document.querySelectorAll('.bar').forEach(b=>{ const me=b.dataset.evid===String(evId),lk=linked.some(l=>String(l.id)===b.dataset.evid); b.classList.toggle('hi',me||lk); b.classList.toggle('dim',!(me||lk)); });
}
function moveTip(e){ const t=document.getElementById('tip'); let x=e.clientX+12,y=e.clientY+12; if(x+t.offsetWidth>window.innerWidth-10) x=e.clientX-t.offsetWidth-10; if(y+t.offsetHeight>window.innerHeight-10) y=e.clientY-t.offsetHeight-10; t.style.left=x+'px'; t.style.top=y+'px'; }
function hideTip(){ document.getElementById('tip').classList.remove('show'); document.querySelectorAll('.bar').forEach(b=>b.classList.remove('hi','dim')); }

// MODAL
function catChange(){
  const cat = +document.getElementById('f-cat').value;
  document.getElementById('sub-fg').style.display = cat===0 ? 'block' : 'none';
  // 필기(1) 또는 실기(2) 선택 시 결과발표 칸 표시
  document.getElementById('result-fg').style.display = (cat===1||cat===2) ? 'block' : 'none';
  if(cat!==1&&cat!==2){ document.getElementById('f-result-start').value=''; document.getElementById('f-result-end').value=''; }
  updateSubUI();
}
function setSub(s){ curSub=s; ['w','p','b'].forEach(k=>document.getElementById('sb-'+k).classList.toggle('active',k===s)); updateSubUI(); }
function updateSubUI(){ const both=curSub==='b'&&+document.getElementById('f-cat').value===0; document.getElementById('date-fg-p').style.display=both?'block':'none'; document.getElementById('date-lbl-w').textContent=both?'필기 신청기간':'날짜 범위'; }
function updDatalist(){ document.getElementById('f-names').innerHTML=[...new Set(evs.map(e=>e.name))].map(n=>`<option value="${n}">`).join(''); }
function openAdd(){
  editId=null; document.getElementById('modal-ttl').textContent='일정 추가'; document.getElementById('del-btn').style.display='none';
  ['f-name','f-place','f-round','f-memo'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-cat').value='0'; document.getElementById('f-start').value=''; document.getElementById('f-end').value='';
  document.getElementById('f-start2').value=''; document.getElementById('f-end2').value='';
  document.getElementById('f-result-start').value=''; document.getElementById('f-result-end').value='';
  curSub='w'; setSub('w'); catChange(); updDatalist(); document.getElementById('modal-ov').classList.add('open');
}
function openEdit(id){
  const ev=evs.find(e=>e.id===id); if(!ev) return;
  editId=id; document.getElementById('modal-ttl').textContent='일정 수정'; document.getElementById('del-btn').style.display='block';
  document.getElementById('f-name').value=ev.name; document.getElementById('f-cat').value=String(ev.cat);
  document.getElementById('f-start').value=ev.start; document.getElementById('f-end').value=ev.end;
  document.getElementById('f-place').value=ev.place||''; document.getElementById('f-round').value=ev.round||''; document.getElementById('f-memo').value=ev.memo||'';
  curSub=ev.sub||'w'; setSub(curSub); catChange();
  if(ev.linkedId){ const lk=evs.find(e=>e.id===ev.linkedId); document.getElementById('f-start2').value=lk?.start||''; document.getElementById('f-end2').value=lk?.end||''; }
  else{ document.getElementById('f-start2').value=''; document.getElementById('f-end2').value=''; }
  // 결과발표 연결 이벤트 불러오기
  const resultEv = evs.find(e=>e.resultLinkedId===ev.id||e.id===ev.resultId);
  document.getElementById('f-result-start').value = resultEv?.start||'';
  document.getElementById('f-result-end').value   = resultEv?.end||'';
  updDatalist(); document.getElementById('modal-ov').classList.add('open');
}
function closeModal(){ document.getElementById('modal-ov').classList.remove('open'); }
async function saveEv(){
  const name=document.getElementById('f-name').value.trim(), cat=+document.getElementById('f-cat').value;
  const start=document.getElementById('f-start').value, end=document.getElementById('f-end').value;
  const start2=document.getElementById('f-start2').value, end2=document.getElementById('f-end2').value;
  const place=document.getElementById('f-place').value.trim(), round=document.getElementById('f-round').value.trim(), memo=document.getElementById('f-memo').value.trim();
  if(!name||!start||!end){ toast('⚠️','시험 이름과 날짜를 입력해주세요'); return; }
  if(start>end){ toast('⚠️','종료일이 시작일보다 앞설 수 없어요'); return; }
  const isBoth=cat===0&&curSub==='b';
  if(isBoth&&(!start2||!end2)){ toast('⚠️','실기 신청기간도 입력해주세요'); return; }
  const resultStart = document.getElementById('f-result-start').value;
  const resultEnd   = document.getElementById('f-result-end').value;

  if(isBoth){
    if(editId!==null){ const ex=evs.find(e=>e.id===editId); const lId=ex?.linkedId; evs=evs.filter(e=>e.id!==editId&&e.id!==lId); const id2=lId||Date.now()+1; evs.push({id:editId,name,cat,sub:'w',start,end,place,round,memo,linkedId:id2}); evs.push({id:id2,name,cat,sub:'p',start:start2,end:end2,place,round,memo,linkedId:editId}); }
    else{ const id1=Date.now(),id2=id1+1; evs.push({id:id1,name,cat,sub:'w',start,end,place,round,memo,linkedId:id2}); evs.push({id:id2,name,cat,sub:'p',start:start2,end:end2,place,round,memo,linkedId:id1}); }
  }else{
    const obj={name,cat,start,end,place,round,memo}; if(cat===0) obj.sub=curSub;
    if(editId!==null){
      // 기존 결과발표 연결 이벤트 삭제 후 재생성
      const oldEv = evs.find(e=>e.id===editId);
      if(oldEv?.resultId) evs = evs.filter(e=>e.id!==oldEv.resultId);
      const i=evs.findIndex(e=>e.id===editId); if(i!==-1) evs[i]={id:editId,...obj};
    } else {
      evs.push({id:Date.now(),...obj});
    }
  }

  // 결과발표 날짜 입력된 경우 자동 이벤트 생성 (필기=1, 실기=2)
  if((cat===1||cat===2) && resultStart) {
    const rEnd = resultEnd || resultStart;
    const mainId = editId !== null ? editId : evs[evs.length-1].id;
    // 기존 연결된 결과발표 이벤트 삭제
    evs = evs.filter(e => e.resultLinkedId !== mainId);
    const rId = Date.now() + 99;
    evs.push({id:rId, name, cat:5, start:resultStart, end:rEnd, place, round, memo:'결과발표', resultLinkedId:mainId});
    // 메인 이벤트에 resultId 저장
    const mi = evs.findIndex(e=>e.id===mainId);
    if(mi!==-1) evs[mi].resultId = rId;
  } else if(cat===1||cat===2) {
    // 결과발표 칸 비웠으면 기존 연결 결과발표 삭제
    const mainId = editId !== null ? editId : evs[evs.length-1].id;
    const oldEv = evs.find(e=>e.id===mainId);
    if(oldEv?.resultId) evs = evs.filter(e=>e.id!==oldEv.resultId);
  }
  closeModal(); renderCal(); await saveEvs(); toast('✓',editId?'수정되었습니다':'일정이 추가되었습니다');
}
async function delEv(){
  if(editId===null) return; if(!confirm('이 일정을 삭제할까요?')) return;
  const ev=evs.find(e=>e.id===editId); const lId=ev?.linkedId; const rId=ev?.resultId;
  evs=evs.filter(e=>e.id!==editId&&e.id!==lId&&e.id!==rId);
  closeModal(); renderCal(); await saveEvs(); toast('🗑','삭제되었습니다');
}
